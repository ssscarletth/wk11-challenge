<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Providence Landmarks</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
	integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
	crossorigin=""/>

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
 
  .star-icon {
    background: none !important;
    border: none !important;
  }

  .star {
    width: 48px;
    height: 48px;
    transition: transform 0.4s ease;
  }

  .star:hover {
    transform: rotate(360deg) scale(1.2);
  }
 
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    font-family: Georgia, serif;
    box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  }

  .leaflet-popup-content {
    font-size: 14px;
    color: #333;
  }

</style>
</head>

<body>
<div id="map"></div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""></script>

<script>
  const map = L.map('map').setView([41.827, -71.413], 15);
 
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
 
  const starIcon = L.divIcon({
    className: 'star-icon',
    html: '<img class="star" src="star.png" alt="star" />',
    iconSize: [48, 48],
    iconAnchor: [24, 24],
    popupAnchor: [0, -26]
  });
 
  const spots = [
    [41.8261, -71.4089, "Hello! I'm the <b>RISD Museum</b>"],
    [41.8311, -71.4149, "Hello! I'm the <b>RI State House</b>"],
    [41.8274, -71.4180, "Hello! I'm <b>Providence Place</b>"]
  ];
 
  spots.forEach(([lat, lng, msg]) => {
    L.marker([lat, lng], { icon: starIcon }).addTo(map).bindPopup(msg);
  });
</script>

</body>
</html>
